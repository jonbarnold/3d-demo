<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Model Demo</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header><h1>3D Model Demo</h1></header>
<main>
  <model-viewer
    src="model/model.gltf"
    alt="3D model"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="studio">
  </model-viewer>
</main>
<footer><p>Hosted on GitHub Pages</p></footer>
</body>
</html>
